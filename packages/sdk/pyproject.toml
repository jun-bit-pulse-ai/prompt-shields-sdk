[project]
name = "prompt-shields"
version = "0.2.0"
description = "Prompt Shields SDK — discover, classify, and govern AI usage in your codebase"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27",
]

[project.optional-dependencies]
openai = ["openai>=1.0"]
anthropic = ["anthropic>=0.34"]
all = ["openai>=1.0", "anthropic>=0.34"]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23", "respx>=0.21", "openai>=1.0", "anthropic>=0.34"]
