[project]
name = "prompt-shields-collector"
version = "0.1.0"
dependencies = [
    "fastapi>=0.110.0",
    "uvicorn>=0.27.0",
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg>=0.29.0",
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "bcrypt>=4.0",
    "pgvector>=0.3.0",
    "python-jose[cryptography]>=3.3.0",
    "python-multipart>=0.0.6",
